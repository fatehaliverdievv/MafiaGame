<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia — İdarəetmə Paneli</title>
<style>
  :root{
    --bg: #f6f5f2;
    --panel: #ffffff;
    --line: #e4e1da;
    --text: #262420;
    --muted: #8a8478;
    --accent: #a83232;
    --accent-soft: #f3e3e1;
    --good: #3f7d5c;
    --off: #c9c4ba;
    --font-display: 'Georgia', 'Iowan Old Style', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Consolas', monospace;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .wrap{ max-width: 980px; margin: 0 auto; }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 24px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .kicker{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 8px;
  }

  h1{
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    margin: 0;
  }

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }

  @media (max-width: 860px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px;
    margin-bottom: 22px;
  }

  .panel h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 16px;
    font-weight: 600;
  }

  .add-row{
    display:flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  input{
    background: #fff;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 7px;
    font-size: 14px;
    font-family: var(--font-body);
    width: 100%;
  }
  input:focus{
    outline: none;
    border-color: var(--accent);
  }

  button{
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 7px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
    white-space: nowrap;
  }
  button:active{ transform: scale(0.97); }

  .btn-primary{ background: var(--accent); color: #fff; }
  .btn-primary:hover{ background: #922b2b; }

  .btn-ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
  }
  .btn-ghost:hover{ border-color: var(--muted); }

  .btn-send{
    background: var(--good);
    color: #fff;
    width: 100%;
    padding: 13px;
    font-size: 15px;
  }
  .btn-send:hover{ background: #356b4d; }
  .btn-send:disabled{ background: var(--off); cursor: not-allowed; }

  ul.list{ list-style:none; margin:0; padding:0; }

  li.row{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  li.row:last-child{ border-bottom:none; }
  li.row.disabled{ opacity: 0.4; }

  .row-label{
    flex:1;
    font-size: 14px;
  }
  .role-row .row-label{ font-weight: 600; }
  .email-row .row-label{ font-family: var(--font-mono); font-size: 13px; }

  /* toggle switch */
  .toggle{ position: relative; display:inline-block; width: 38px; height: 21px; flex-shrink:0; }
  .toggle input{ display:none; }
  .slider{
    position:absolute; inset:0;
    background: var(--off);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .slider::before{
    content:"";
    position:absolute;
    height: 15px; width:15px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius:50%;
    transition: transform 0.15s ease;
  }
  .toggle input:checked + .slider{ background: var(--good); }
  .toggle input:checked + .slider::before{ transform: translateX(17px); }

  .icon-btn{
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 14px;
    padding: 4px 6px;
    cursor: pointer;
  }
  .icon-btn:hover{ color: var(--accent); }

  .empty{ text-align:center; color: var(--muted); padding: 24px 0; font-size: 13px; }

  .status-line{
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 12px;
    white-space: pre-wrap;
  }
  .status-line.ok{ color: var(--good); }
  .status-line.err{ color: var(--accent); }

  .server-note{
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 10px;
  }
  .server-note code{
    background: var(--accent-soft);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="kicker">Mafia Oyunu</p>
      <h1>İdarəetmə Paneli</h1>
    </div>
  </header>

  <div class="grid">
    <!-- ROLES -->
    <div class="panel">
      <h2>Rollar</h2>
      <div class="add-row">
        <input id="inpRole" type="text" placeholder="Rol adı (məs: mafia, serif)">
        <button class="btn-primary" onclick="addRole()">Əlavə et</button>
      </div>
      <ul class="list" id="roleRows"></ul>
      <div id="roleEmpty" class="empty" style="display:none;">Hələ rol əlavə olunmayıb.</div>
    </div>

    <!-- PLAYERS -->
    <div class="panel">
      <h2>İştirakçılar</h2>
      <div class="add-row">
        <input id="inpName" type="text" placeholder="Ad">
        <input id="inpEmail" type="email" placeholder="ornek@gmail.com">
        <button class="btn-primary" onclick="addPlayer()">Əlavə et</button>
      </div>
      <ul class="list" id="playerRows"></ul>
      <div id="playerEmpty" class="empty" style="display:none;">Hələ iştirakçı əlavə olunmayıb.</div>
    </div>
  </div>

  <div class="panel">
    <h2>Göndər</h2>
    <button class="btn-send" id="sendBtn" onclick="sendMails()">Rolları paylaşdır və mail göndər</button>
    <div class="server-note">
      Bu düymə <code>/api/send-mafia-mails</code> serverless funksiyasına sorğu göndərir.
    </div>
    <div id="statusLine" class="status-line"></div>
  </div>

  <div class="panel">
    <h2>Admin — Rol Bölgüsünə Bax</h2>
    <div class="add-row">
      <input id="inpAdminPass" type="password" placeholder="Admin şifrəsi">
      <button class="btn-ghost" onclick="viewAssignments()">Göstər</button>
    </div>
    <div id="adminResult"></div>
  </div>

</div>

<script>
  const ROLE_KEY = "mafia_roles_v2";
  const PLAYER_KEY = "mafia_players_v2";
  const SEND_ENDPOINT = "/api/send-mafia-mails";

  let roles = [];
  let players = [];

  function load(){
    try{ roles = JSON.parse(localStorage.getItem(ROLE_KEY)) || []; }catch(e){ roles = []; }
    try{ players = JSON.parse(localStorage.getItem(PLAYER_KEY)) || []; }catch(e){ players = []; }
  }

  function persist(){
    localStorage.setItem(ROLE_KEY, JSON.stringify(roles));
    localStorage.setItem(PLAYER_KEY, JSON.stringify(players));
  }

  function addRole(){
    const inp = document.getElementById('inpRole');
    const name = inp.value.trim();
    if(!name) return;
    roles.push({ id: Date.now()+Math.random().toString(16).slice(2), name, enabled: true });
    inp.value = "";
    persist(); render();
  }

  function addPlayer(){
    const nameInp = document.getElementById('inpName');
    const emailInp = document.getElementById('inpEmail');
    const name = nameInp.value.trim();
    const email = emailInp.value.trim();
    if(!name){ alert("Ad boş ola bilməz."); return; }
    if(!email || !email.includes('@')) { alert("Düzgün email ünvanı yaz."); return; }
    players.push({ id: Date.now()+Math.random().toString(16).slice(2), name, email, enabled: true });
    nameInp.value = "";
    emailInp.value = "";
    persist(); render();
  }

  function toggleRole(id){
    const r = roles.find(x=>x.id===id); if(r) r.enabled = !r.enabled;
    persist(); render();
  }
  function togglePlayer(id){
    const p = players.find(x=>x.id===id); if(p) p.enabled = !p.enabled;
    persist(); render();
  }
  function removeRole(id){ roles = roles.filter(x=>x.id!==id); persist(); render(); }
  function removePlayer(id){ players = players.filter(x=>x.id!==id); persist(); render(); }

  function render(){
    const roleTbody = document.getElementById('roleRows');
    const roleEmpty = document.getElementById('roleEmpty');
    if(roles.length === 0){ roleTbody.innerHTML=""; roleEmpty.style.display='block'; }
    else{
      roleEmpty.style.display='none';
      roleTbody.innerHTML = roles.map(r => `
        <li class="row role-row ${r.enabled?'':'disabled'}">
          <span class="row-label">${escapeHtml(r.name)}</span>
          <label class="toggle">
            <input type="checkbox" ${r.enabled?'checked':''} onchange="toggleRole('${r.id}')">
            <span class="slider"></span>
          </label>
          <button class="icon-btn" onclick="removeRole('${r.id}')">✕</button>
        </li>
      `).join('');
    }

    const playerTbody = document.getElementById('playerRows');
    const playerEmpty = document.getElementById('playerEmpty');
    if(players.length === 0){ playerTbody.innerHTML=""; playerEmpty.style.display='block'; }
    else{
      playerEmpty.style.display='none';
      playerTbody.innerHTML = players.map(p => `
        <li class="row email-row ${p.enabled?'':'disabled'}">
          <span class="row-label"><strong>${escapeHtml(p.name)}</strong> — <span style="font-family: var(--font-mono); font-size:12.5px; color:var(--muted);">${escapeHtml(p.email)}</span></span>
          <label class="toggle">
            <input type="checkbox" ${p.enabled?'checked':''} onchange="togglePlayer('${p.id}')">
            <span class="slider"></span>
          </label>
          <button class="icon-btn" onclick="removePlayer('${p.id}')">✕</button>
        </li>
      `).join('');
    }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? "";
    return div.innerHTML;
  }

  async function sendMails(){
    const activeRoles = roles.filter(r=>r.enabled).map(r=>r.name);
    const activePlayers = players.filter(p=>p.enabled).map(p=>({ name: p.name, email: p.email }));

    const statusLine = document.getElementById('statusLine');
    const sendBtn = document.getElementById('sendBtn');
    statusLine.className = "status-line";
    statusLine.textContent = "";

    if(activeRoles.length === 0 || activePlayers.length === 0){
      statusLine.className = "status-line err";
      statusLine.textContent = "Ən azı 1 aktiv rol və 1 aktiv iştirakçı olmalıdır.";
      return;
    }
    if(activeRoles.length !== activePlayers.length){
      statusLine.className = "status-line err";
      statusLine.textContent = `Aktiv rol sayı (${activeRoles.length}) aktiv iştirakçı sayına (${activePlayers.length}) bərabər deyil.`;
      return;
    }

    sendBtn.disabled = true;
    statusLine.textContent = "Göndərilir...";

    try{
      const res = await fetch(SEND_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ roles: activeRoles, players: activePlayers })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Naməlum xəta");

      statusLine.className = "status-line ok";
      statusLine.textContent = `Göndərildi:\n` + data.results.map(r => `${r.name} (${r.email}) -> ${r.status}`).join('\n');
    }catch(err){
      statusLine.className = "status-line err";
      statusLine.textContent = "Xəta: " + err.message + "\n(Server işə salınıbmı? bax: server.js)";
    }finally{
      sendBtn.disabled = false;
    }
  }

  async function viewAssignments(){
    const pass = document.getElementById('inpAdminPass').value;
    const resultBox = document.getElementById('adminResult');
    resultBox.innerHTML = "";

    if(!pass){
      resultBox.innerHTML = `<div class="status-line err">Şifrəni daxil et.</div>`;
      return;
    }

    try{
      const res = await fetch("/api/admin-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pass })
      });
      const data = await res.json();

      if(!res.ok){
        resultBox.innerHTML = `<div class="status-line err">${escapeHtml(data.error || "Xəta baş verdi.")}</div>`;
        return;
      }

      if(!data.assignments || data.assignments.length === 0){
        resultBox.innerHTML = `<div class="status-line">${escapeHtml(data.message || "Nəticə yoxdur.")}</div>`;
        return;
      }

      resultBox.innerHTML = `
        <ul class="list" style="margin-top:14px;">
          ${data.assignments.map(a => `
            <li class="row">
              <span class="row-label"><strong>${escapeHtml(a.name)}</strong> — <span style="font-family: var(--font-mono); font-size:12.5px; color:var(--muted);">${escapeHtml(a.email)}</span></span>
              <span class="role-badge" style="background:var(--accent-soft); border-color:var(--accent); padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;">${escapeHtml(a.role)}</span>
            </li>
          `).join('')}
        </ul>
      `;
    }catch(err){
      resultBox.innerHTML = `<div class="status-line err">Server ilə əlaqə yoxdur: ${escapeHtml(err.message)}</div>`;
    }
  }

  load();
  render();
</script>
</body>
</html>
